<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live TV Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Live TV Admin Dashboard</h1>
        </header>
        
        <main>
            <section class="form-section">
                <h2 id="form-title">Add New Channel</h2>
                <form id="channel-form">
                    <input type="hidden" id="channel-id">
                    
                    <div class="form-group">
                        <label for="name">Channel Name:</label>
                        <input type="text" id="name" required placeholder="e.g. ETV Cinema">
                    </div>
                    
                    <div class="form-group">
                        <label for="icon">Channel Logo URL:</label>
                        <input type="url" id="icon" required placeholder="https://example.com/logo.webp">
                    </div>
                    
                    <div class="form-group">
                        <label for="url">Stream URL (m3u8):</label>
                        <input type="url" id="url" required placeholder="https://example.com/stream.m3u8">
                    </div>
                    
                    <div class="form-group">
                        <label for="category">Category:</label>
                        <input type="text" id="category" required placeholder="e.g. Movies">
                    </div>
                    
                    <div class="form-actions">
                        <button type="submit" id="submit-btn">Save Channel</button>
                        <button type="button" id="cancel-btn" class="secondary" style="display: none;">Cancel Edit</button>
                    </div>
                </form>
            </section>
            
            <section class="list-section">
                <h2>Manage Channels</h2>
                <div id="loading" class="loading">Loading channels...</div>
                <div id="error-message" class="error" style="display: none;"></div>
                
                <table id="channels-table">
                    <thead>
                        <tr>
                            <th>Logo</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Stream URL</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="channels-list">
                        <!-- Channels will be inserted here dynamically -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
